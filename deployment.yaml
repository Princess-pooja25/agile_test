apiVersion: apps/v1
kind: Deployment
metadata:
  name: bio-data-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bio-data
  template:
    metadata:
      labels:
        app: bio-data
    spec:
      containers:
      - name: bio-data
        image: princesspooja25/bio-data-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: bio-data-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: bio-data
